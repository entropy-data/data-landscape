name: Build artefacts

# Re-runs the prerender step (which keeps the static tile HTML, JSON-LD,
# sitemap.xml, llms.txt, llms-full.txt, the per-standard pages under
# standards/, and the footer "Updated" date in sync with
# standards.json) and regenerates data-landscape.pdf whenever the page
# content or generation pipeline changes, then commits any changes back
# to main. The PDF itself is excluded from the trigger paths to avoid
# loops; the regenerated index.html and friends are also self-managed so
# the bot push doesn't re-trigger the workflow on its own commit.
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'standards.json'
      - 'src/**'
      - 'dist/**'
      - 'media/**'
      - 'fonts/**'
      - 'js/**'
      - 'scripts/**'
      - '.github/workflows/generate-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-artefacts
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the prerender script can pick up the latest
          # commit date for the footer.
          fetch-depth: 0
          # Use a token with write access so the auto-commit pushes back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Chromium for Playwright
        run: uv run --with playwright python -m playwright install --with-deps chromium

      - name: Install poppler and ImageMagick for social preview
        run: sudo apt-get update && sudo apt-get install -y poppler-utils imagemagick

      - name: Prerender static HTML, JSON-LD, sitemap, llms.txt
        run: uv run scripts/prerender.py

      - name: Serve the site
        run: |
          python3 -m http.server 8000 --directory . &
          for i in {1..10}; do
            curl -sf http://127.0.0.1:8000/ -o /dev/null && break
            sleep 1
          done

      - name: Generate PDF
        run: uv run scripts/generate-pdf.py http://127.0.0.1:8000/

      - name: Generate social preview image
        run: ./scripts/generate-social-preview.sh

      - name: Generate industry-ontologies social preview image
        run: uv run scripts/generate-industry-ontologies-preview.py http://127.0.0.1:8000/

      - name: Commit changes if any
        run: |
          # `git add` before diffing: the per-standard pages under standards/
          # can be brand new (untracked), which `git diff` alone never reports.
          git add index.html sitemap.xml llms.txt llms-full.txt standards/ \
                  data-landscape.pdf \
                  media/social/data-architecture-landscape.png \
                  media/social/industry-ontologies.png
          if git diff --cached --quiet; then
            echo "No artefact changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Regenerate prerendered artefacts and PDF"
          git push
