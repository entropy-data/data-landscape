name: Generate PDF

# Re-renders data-landscape.pdf whenever the page's content or
# generation pipeline changes, then commits the PDF back to main.
# The PDF itself is excluded from the trigger paths to avoid loops.
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'src/**'
      - 'dist/**'
      - 'media/**'
      - 'fonts/**'
      - 'js/**'
      - 'scripts/generate-pdf.py'
      - '.github/workflows/generate-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-pdf
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token with write access so the auto-commit pushes back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Chromium for Playwright
        run: uv run --with playwright python -m playwright install --with-deps chromium

      - name: Serve the site
        run: |
          python3 -m http.server 8000 --directory . &
          for i in {1..10}; do
            curl -sf http://127.0.0.1:8000/ -o /dev/null && break
            sleep 1
          done

      - name: Generate PDF
        run: uv run scripts/generate-pdf.py http://127.0.0.1:8000/

      - name: Commit PDF if changed
        run: |
          if git diff --quiet -- data-landscape.pdf; then
            echo "PDF unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-landscape.pdf
          git commit -m "Regenerate data-landscape.pdf"
          git push
