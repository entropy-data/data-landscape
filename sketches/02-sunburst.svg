<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-size: 13px; fill: #475569; }
    .cat-label { font-size: 13px; font-weight: 700; fill: #0f172a; }
    .sub-label { font-size: 10px; font-weight: 600; fill: #1e293b; }
    .leaf-label { font-size: 8px; fill: #0f172a; }
    .center-label { font-size: 16px; font-weight: 700; fill: #fff; }
    .legend-text { font-size: 12px; fill: #334155; }
    .note { font-size: 11px; fill: #64748b; font-style: italic; }
  </style>
  <rect width="1200" height="820" fill="#f8fafc"/>
  <text x="40" y="40" class="title">2 — Sunburst (hierarchical)</text>
  <text x="40" y="60" class="subtitle">Centre → category → judgement → standard. Arc length ∝ count. Colour = judgement.</text>

  <g transform="translate(440 430)">
    <!-- Outer ring: standards (leaves) - 6 categories of 60° each -->
    <!-- Each category split into 4 judgement wedges -->

    <!-- Category 1: Definition (top, -90°..-30°) -->
    <!-- adopt (green) -->
    <path d="M 0 0 L 0 -340 A 340 340 0 0 1 152.97 -303.65 Z" fill="#86efac" stroke="#fff"/>
    <!-- situational (amber) -->
    <path d="M 0 0 L 152.97 -303.65 A 340 340 0 0 1 245.32 -235.21 Z" fill="#fbbf24" stroke="#fff"/>
    <!-- assess (slate) -->
    <path d="M 0 0 L 245.32 -235.21 A 340 340 0 0 1 303.65 -152.97 Z" fill="#cbd5e1" stroke="#fff"/>
    <!-- caution (red) -->
    <path d="M 0 0 L 303.65 -152.97 A 340 340 0 0 1 340 0 L 0 0 Z" fill="#fca5a5" stroke="#fff"/>

    <!-- Storage (30°..90° / right-bottom) -->
    <path d="M 0 0 L 340 0 A 340 340 0 0 1 303.65 152.97 Z" fill="#86efac" stroke="#fff"/>
    <path d="M 0 0 L 303.65 152.97 A 340 340 0 0 1 245.32 235.21 Z" fill="#fbbf24" stroke="#fff"/>
    <path d="M 0 0 L 245.32 235.21 A 340 340 0 0 1 152.97 303.65 Z" fill="#cbd5e1" stroke="#fff"/>
    <path d="M 0 0 L 152.97 303.65 A 340 340 0 0 1 0 340 Z" fill="#fca5a5" stroke="#fff"/>

    <!-- Movement (90°..150°) -->
    <path d="M 0 0 L 0 340 A 340 340 0 0 1 -152.97 303.65 Z" fill="#86efac" stroke="#fff"/>
    <path d="M 0 0 L -152.97 303.65 A 340 340 0 0 1 -245.32 235.21 Z" fill="#fbbf24" stroke="#fff"/>
    <path d="M 0 0 L -245.32 235.21 A 340 340 0 0 1 -303.65 152.97 Z" fill="#cbd5e1" stroke="#fff"/>
    <path d="M 0 0 L -303.65 152.97 A 340 340 0 0 1 -340 0 Z" fill="#fca5a5" stroke="#fff"/>

    <!-- Transformation (150°..210°) -->
    <path d="M 0 0 L -340 0 A 340 340 0 0 1 -303.65 -152.97 Z" fill="#86efac" stroke="#fff"/>
    <path d="M 0 0 L -303.65 -152.97 A 340 340 0 0 1 -245.32 -235.21 Z" fill="#fbbf24" stroke="#fff"/>
    <path d="M 0 0 L -245.32 -235.21 A 340 340 0 0 1 -152.97 -303.65 Z" fill="#cbd5e1" stroke="#fff"/>
    <path d="M 0 0 L -152.97 -303.65 A 340 340 0 0 1 0 -340 Z" fill="#fca5a5" stroke="#fff"/>

    <!-- Inner ring: 6 categories -->
    <path d="M 0 0 L 0 -200 A 200 200 0 0 1 173.21 -100 Z" fill="#0891b2" opacity=".85" stroke="#fff" stroke-width="2"/>
    <path d="M 0 0 L 173.21 -100 A 200 200 0 0 1 173.21 100 Z" fill="#7c3aed" opacity=".85" stroke="#fff" stroke-width="2"/>
    <path d="M 0 0 L 173.21 100 A 200 200 0 0 1 0 200 Z" fill="#db2777" opacity=".85" stroke="#fff" stroke-width="2"/>
    <path d="M 0 0 L 0 200 A 200 200 0 0 1 -173.21 100 Z" fill="#ea580c" opacity=".85" stroke="#fff" stroke-width="2"/>
    <path d="M 0 0 L -173.21 100 A 200 200 0 0 1 -173.21 -100 Z" fill="#65a30d" opacity=".85" stroke="#fff" stroke-width="2"/>
    <path d="M 0 0 L -173.21 -100 A 200 200 0 0 1 0 -200 Z" fill="#0284c7" opacity=".85" stroke="#fff" stroke-width="2"/>

    <!-- Category labels (inner ring) -->
    <text x="86" y="-145" class="cat-label" fill="#fff" text-anchor="middle">Definition</text>
    <text x="170" y="5"   class="cat-label" fill="#fff" text-anchor="middle">Storage</text>
    <text x="86" y="155"  class="cat-label" fill="#fff" text-anchor="middle">Movement</text>
    <text x="-86" y="155" class="cat-label" fill="#fff" text-anchor="middle">Transform.</text>
    <text x="-170" y="5"  class="cat-label" fill="#fff" text-anchor="middle">Discovery</text>
    <text x="-86" y="-145" class="cat-label" fill="#fff" text-anchor="middle">Operations</text>

    <!-- Centre -->
    <circle r="70" fill="#0f172a"/>
    <text x="0" y="-4" class="center-label" text-anchor="middle">Data</text>
    <text x="0" y="16" class="center-label" text-anchor="middle">Landscape</text>

    <!-- Some leaf labels along outer arc -->
    <text x="40"  y="-318" class="leaf-label" text-anchor="middle">ODCS</text>
    <text x="105" y="-308" class="leaf-label" text-anchor="middle">OpenAPI</text>
    <text x="195" y="-275" class="leaf-label" text-anchor="middle">AsyncAPI</text>
    <text x="295" y="-180" class="leaf-label" text-anchor="middle">XML Sch.</text>
    <text x="325" y="-65"  class="leaf-label" text-anchor="middle">Iceberg</text>
    <text x="320" y="60"   class="leaf-label" text-anchor="middle">Parquet</text>
    <text x="275" y="195"  class="leaf-label" text-anchor="middle">Delta</text>
    <text x="180" y="290"  class="leaf-label" text-anchor="middle">HDFS</text>
    <text x="50"  y="325"  class="leaf-label" text-anchor="middle">Kafka</text>
    <text x="-50" y="325"  class="leaf-label" text-anchor="middle">HTTP</text>
    <text x="-180" y="290" class="leaf-label" text-anchor="middle">FTP</text>
    <text x="-275" y="195" class="leaf-label" text-anchor="middle">dbt</text>
    <text x="-320" y="60"  class="leaf-label" text-anchor="middle">Arrow</text>
    <text x="-320" y="-65" class="leaf-label" text-anchor="middle">XSLT</text>
    <text x="-275" y="-180" class="leaf-label" text-anchor="middle">SQL</text>
    <text x="-160" y="-285" class="leaf-label" text-anchor="middle">JDBC</text>
    <text x="-80"  y="-318" class="leaf-label" text-anchor="middle">MDX</text>
  </g>

  <!-- Legend -->
  <g transform="translate(840 120)">
    <text x="0" y="0" class="title" style="font-size:16px">Reading the rings</text>
    <g transform="translate(0 20)">
      <rect x="0"  y="0" width="180" height="22" fill="#0f172a"/>
      <text x="90" y="15" class="legend-text" fill="#fff" text-anchor="middle">centre — root</text>
      <rect x="0"  y="28" width="180" height="22" fill="#0891b2" opacity=".85"/>
      <text x="90" y="43" class="legend-text" fill="#fff" text-anchor="middle">ring 1 — category</text>
      <rect x="0"  y="56" width="45" height="22" fill="#86efac"/>
      <rect x="45" y="56" width="45" height="22" fill="#fbbf24"/>
      <rect x="90" y="56" width="45" height="22" fill="#cbd5e1"/>
      <rect x="135" y="56" width="45" height="22" fill="#fca5a5"/>
      <text x="90" y="71" class="legend-text" text-anchor="middle">ring 2 — judgement</text>
      <rect x="0" y="84" width="180" height="22" fill="#fff" stroke="#cbd5e1"/>
      <text x="90" y="99" class="legend-text" text-anchor="middle">ring 3 — standards (one per slice)</text>
    </g>

    <text x="0" y="160" class="title" style="font-size:16px">Strengths</text>
    <text x="0" y="182" class="legend-text">• Hierarchy + counts both encoded by arc size.</text>
    <text x="0" y="200" class="legend-text">• Beautiful overview — a single shape per category.</text>
    <text x="0" y="218" class="legend-text">• Click-to-zoom (D3 partition) scales to ~80 items.</text>

    <text x="0" y="252" class="title" style="font-size:16px">Trade-offs</text>
    <text x="0" y="274" class="legend-text">• Hard to compare individual standards.</text>
    <text x="0" y="292" class="legend-text">• Outer labels rotate — readability suffers.</text>
    <text x="0" y="310" class="legend-text">• Empty (judgement, category) cells look skewed.</text>

    <text x="0" y="350" class="title" style="font-size:16px">Variants</text>
    <text x="0" y="372" class="legend-text">• Swap ring 1 / ring 2 (umbrella vs. category first).</text>
    <text x="0" y="390" class="legend-text">• Animate zoom from selected wedge.</text>
  </g>

  <text x="40" y="790" class="note">Sketch — illustrative arc proportions. Real version computes arc lengths from actual counts via D3 partition layout.</text>
</svg>
