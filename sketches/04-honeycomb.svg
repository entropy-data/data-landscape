<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-size: 13px; fill: #475569; }
    .cluster-label { font-size: 14px; font-weight: 700; fill: #0f172a; }
    .cell-label { font-size: 9px; font-weight: 600; fill: #0f172a; }
    .legend-text { font-size: 12px; fill: #334155; }
    .note { font-size: 11px; fill: #64748b; font-style: italic; }
    .hex { stroke: #fff; stroke-width: 2; }
    .pick { stroke: #f59e0b; stroke-width: 3; }
  </style>
  <rect width="1200" height="820" fill="#f8fafc"/>
  <text x="40" y="40" class="title">4 — Hexagonal Honeycomb (CNCF-style)</text>
  <text x="40" y="60" class="subtitle">Six tight clusters of hex tiles, one per category. Each tile = standard; colour = judgement; gold border = pick.</text>

  <!-- Hex helper: pointy-top hex, side=22 -> w=38.1, h=44 -->
  <!-- Define a hex group used by transforms -->
  <defs>
    <polygon id="hex" points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11"/>
  </defs>

  <!-- DEFINITION cluster (top-left) -->
  <g transform="translate(220 180)">
    <text x="0" y="-90" class="cluster-label" text-anchor="middle">Definition</text>
    <!-- 7 hexes in a small flower + 1 -->
    <g><use href="#hex" fill="#34d399" class="hex pick"/><text class="cell-label" text-anchor="middle" y="3">ODCS</text></g>
    <g transform="translate(38 -22)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">OpenAPI</text></g>
    <g transform="translate(38  22)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">AsyncAPI</text></g>
    <g transform="translate(0   44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">GraphQL</text></g>
    <g transform="translate(-38 22)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">LinkML</text></g>
    <g transform="translate(-38 -22)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">XML-Sch</text></g>
    <g transform="translate(0  -44)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">JSON-Sch</text></g>
    <g transform="translate(76 0)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Proto</text></g>
    <g transform="translate(76 44)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">AVRO-S</text></g>
    <g transform="translate(76 -44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">SQL-DDL</text></g>
  </g>

  <!-- STORAGE cluster (top-centre) -->
  <g transform="translate(600 180)">
    <text x="0" y="-90" class="cluster-label" text-anchor="middle">Storage</text>
    <g><use href="#hex" fill="#34d399" class="hex pick"/><text class="cell-label" text-anchor="middle" y="3">Iceberg</text></g>
    <g transform="translate(38 -22)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Parquet</text></g>
    <g transform="translate(38  22)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Delta</text></g>
    <g transform="translate(0   44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">ORC</text></g>
    <g transform="translate(-38 22)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">S3</text></g>
    <g transform="translate(-38 -22)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">DuckLake</text></g>
    <g transform="translate(0  -44)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Lance</text></g>
    <g transform="translate(76 0)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">HDFS</text></g>
    <g transform="translate(76 -44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Hudi</text></g>
  </g>

  <!-- MOVEMENT cluster (top-right) -->
  <g transform="translate(980 180)">
    <text x="0" y="-90" class="cluster-label" text-anchor="middle">Movement</text>
    <g><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">HTTP</text></g>
    <g transform="translate(38 -22)"><use href="#hex" fill="#34d399" class="hex pick"/><text class="cell-label" text-anchor="middle" y="3">Kafka</text></g>
    <g transform="translate(38  22)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">MQTT</text></g>
    <g transform="translate(0   44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">CloudEv</text></g>
    <g transform="translate(-38 22)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">AMQP</text></g>
    <g transform="translate(-38 -22)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">MCP</text></g>
    <g transform="translate(0  -44)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">A2A</text></g>
    <g transform="translate(-76 0)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">FTP</text></g>
    <g transform="translate(-76 -44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">DeltaShr</text></g>
  </g>

  <!-- TRANSFORMATION cluster (bottom-left) -->
  <g transform="translate(220 530)">
    <text x="0" y="-90" class="cluster-label" text-anchor="middle">Transformation</text>
    <g><use href="#hex" fill="#34d399" class="hex pick"/><text class="cell-label" text-anchor="middle" y="3">dbt</text></g>
    <g transform="translate(38 -22)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Arrow</text></g>
    <g transform="translate(38  22)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Spark</text></g>
    <g transform="translate(0   44)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">pandas</text></g>
    <g transform="translate(-38 22)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Ibis</text></g>
    <g transform="translate(-38 -22)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">Substrait</text></g>
    <g transform="translate(0  -44)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">DF-API</text></g>
    <g transform="translate(76 0)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">XSLT</text></g>
  </g>

  <!-- DISCOVERY cluster (bottom-centre) -->
  <g transform="translate(600 530)">
    <text x="0" y="-90" class="cluster-label" text-anchor="middle">Discovery</text>
    <g><use href="#hex" fill="#34d399" class="hex pick"/><text class="cell-label" text-anchor="middle" y="3">OpLineage</text></g>
    <g transform="translate(38 -22)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">DCAT</text></g>
    <g transform="translate(38  22)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">UnityCat</text></g>
    <g transform="translate(0   44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">SchReg</text></g>
    <g transform="translate(-38 22)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">HiveMS</text></g>
    <g transform="translate(-38 -22)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">OSI</text></g>
    <g transform="translate(0  -44)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">DPROD</text></g>
    <g transform="translate(76 0)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">RDF/OWL</text></g>
    <g transform="translate(76 -44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">SKOS</text></g>
  </g>

  <!-- OPERATIONS cluster (bottom-right) -->
  <g transform="translate(980 530)">
    <text x="0" y="-90" class="cluster-label" text-anchor="middle">Operations</text>
    <g><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">SQL</text></g>
    <g transform="translate(38 -22)"><use href="#hex" fill="#34d399" class="hex"/><text class="cell-label" text-anchor="middle" y="3">OpenTel</text></g>
    <g transform="translate(38  22)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">JDBC</text></g>
    <g transform="translate(0   44)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">ODBC</text></g>
    <g transform="translate(-38 22)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">ADBC</text></g>
    <g transform="translate(-38 -22)"><use href="#hex" fill="#cbd5e1" class="hex"/><text class="cell-label" text-anchor="middle" y="3">GQL</text></g>
    <g transform="translate(0  -44)"><use href="#hex" fill="#fbbf24" class="hex"/><text class="cell-label" text-anchor="middle" y="3">SPARQL</text></g>
    <g transform="translate(-76 0)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">MDX</text></g>
    <g transform="translate(-76 -44)"><use href="#hex" fill="#fca5a5" class="hex"/><text class="cell-label" text-anchor="middle" y="3">XMLA</text></g>
  </g>

  <!-- Legend -->
  <g transform="translate(40 660)">
    <text x="0" y="0" class="title" style="font-size:14px">Judgement (fill)</text>
    <g transform="translate(0 12)">
      <use href="#hex" x="20" y="14" fill="#34d399" class="hex"/><text x="50" y="18" class="legend-text">Adopt</text>
      <use href="#hex" x="130" y="14" fill="#fbbf24" class="hex"/><text x="160" y="18" class="legend-text">Situational</text>
      <use href="#hex" x="260" y="14" fill="#cbd5e1" class="hex"/><text x="290" y="18" class="legend-text">Assess</text>
      <use href="#hex" x="370" y="14" fill="#fca5a5" class="hex"/><text x="400" y="18" class="legend-text">Caution</text>
      <use href="#hex" x="480" y="14" fill="#34d399" class="hex pick"/><text x="510" y="18" class="legend-text">Highlight (gold border)</text>
    </g>
  </g>

  <g transform="translate(700 660)">
    <text x="0" y="0" class="title" style="font-size:14px">Why this view</text>
    <text x="0" y="18" class="legend-text">• Looks great on a poster — instantly “a landscape, not a list”.</text>
    <text x="0" y="36" class="legend-text">• Tile size accommodates the logo — could replace text labels.</text>
    <text x="0" y="54" class="legend-text">• Cluster shape grows with category — visual density matters.</text>
    <text x="0" y="72" class="legend-text">• Trade-off: judgement only readable from colour, not position.</text>
  </g>

  <text x="40" y="790" class="note">Sketch — hex sizes &amp; positions illustrative. Real version would replace text with logos and use a packing algorithm per cluster.</text>
</svg>
